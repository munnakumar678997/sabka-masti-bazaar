    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Sabka Masti Bazaar</title>

    <!-- ══ INLINE bfcache fix — React se pehle load hota hai ══ -->
    <!-- Yeh script bfcache restore pe TURANT fire hota hai -->
    <script>
      (function () {
        // Layer 1: bfcache restore detect karo — standard browsers ke liye
        window.addEventListener('pageshow', function (e) {
          if (e.persisted) {
            try { sessionStorage.removeItem('smb_session'); } catch (_) {}
            // Cache-busting URL — ?_r=timestamp force karta hai browser ko
            // fresh index.html + JS/CSS fetch karne ke liye (browser cache bypass)
            window.location.replace(
              window.location.origin + window.location.pathname + '?_r=' + Date.now()
            );
          }
        });
      })();
    </script>
