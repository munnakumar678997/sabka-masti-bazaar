<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#052e16"/>
      <stop offset="55%"  stop-color="#0f3d25"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Coin face -->
    <radialGradient id="coinFace" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="25%"  stop-color="#fde68a"/>
      <stop offset="60%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Coin shine -->
    <radialGradient id="coinShine" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.52)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Ambient glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(251,191,36,0.2)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
    <!-- Basket body fill -->
    <linearGradient id="basketFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(34,197,94,0.14)"/>
      <stop offset="100%" stop-color="rgba(22,163,74,0.08)"/>
    </linearGradient>
    <!-- Handle gradient -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="50%"  stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <filter id="coinShadow" x="-25%" y="-15%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="handleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Background subtle dots -->
  <g opacity="0.05">
    <circle cx="80"  cy="80"  r="2.5" fill="#4ade80"/>
    <circle cx="160" cy="56"  r="2"   fill="#4ade80"/>
    <circle cx="352" cy="56"  r="2"   fill="#4ade80"/>
    <circle cx="432" cy="80"  r="2.5" fill="#4ade80"/>
    <circle cx="56"  cy="200" r="2"   fill="#4ade80"/>
    <circle cx="456" cy="200" r="2"   fill="#4ade80"/>
    <circle cx="68"  cy="420" r="2"   fill="#4ade80"/>
    <circle cx="444" cy="420" r="2"   fill="#4ade80"/>
  </g>

  <!-- ── SHOPPING BASKET BODY (drawn first — behind coin) ── -->
  <!-- Basket shadow -->
  <ellipse cx="256" cy="464" rx="118" ry="14" fill="rgba(0,0,0,0.35)"/>

  <!-- Basket body: trapezoid shape -->
  <path d="M 134 298 L 148 450 Q 150 464 164 464 L 348 464 Q 362 464 364 450 L 378 298 Z"
        fill="url(#basketFill)"
        stroke="#22c55e"
        stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- Basket grid lines (vertical) -->
  <g stroke="rgba(34,197,94,0.22)" stroke-width="1.5">
    <line x1="182" y1="299" x2="170" y2="463"/>
    <line x1="230" y1="299" x2="224" y2="463"/>
    <line x1="282" y1="299" x2="288" y2="463"/>
    <line x1="330" y1="299" x2="342" y2="463"/>
  </g>
  <!-- Basket grid lines (horizontal) -->
  <g stroke="rgba(34,197,94,0.18)" stroke-width="1.5">
    <line x1="136" y1="340" x2="376" y2="340"/>
    <line x1="139" y1="385" x2="373" y2="385"/>
    <line x1="142" y1="430" x2="370" y2="430"/>
  </g>

  <!-- Basket top rim -->
  <path d="M 124 296 Q 124 288 132 288 L 380 288 Q 388 288 388 296 L 388 308 Q 388 316 380 316 L 132 316 Q 124 316 124 308 Z"
        fill="rgba(34,197,94,0.18)"
        stroke="#22c55e"
        stroke-width="3"/>

  <!-- ── COIN AMBIENT GLOW ── -->
  <ellipse cx="256" cy="240" rx="150" ry="142" fill="url(#glow)"/>

  <!-- ── MAIN GOLD COIN ── -->
  <!-- Coin drop shadow -->
  <ellipse cx="256" cy="268" rx="108" ry="18" fill="rgba(0,0,0,0.4)"/>

  <!-- Coin body -->
  <circle cx="256" cy="238" r="116" fill="url(#coinFace)" filter="url(#coinShadow)"/>

  <!-- Coin outer ring -->
  <circle cx="256" cy="238" r="116" fill="none" stroke="#92400e" stroke-width="3.5" opacity="0.4"/>

  <!-- Coin inner groove -->
  <circle cx="256" cy="238" r="96"  fill="none" stroke="#d97706" stroke-width="2" opacity="0.55"/>
  <circle cx="256" cy="238" r="91"  fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Coin shine -->
  <circle cx="256" cy="238" r="116" fill="url(#coinShine)"/>

  <!-- ── "SMB" TEXT ON COIN ── -->
  <!-- Shadow/glow layer -->
  <text x="256" y="256"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="66" font-weight="900"
        text-anchor="middle" dominant-baseline="middle"
        fill="rgba(120,53,15,0.4)"
        transform="translate(0,4)">SMB</text>

  <!-- Main SMB text -->
  <text x="256" y="256"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="66" font-weight="900"
        text-anchor="middle" dominant-baseline="middle"
        fill="#78350f"
        filter="url(#textGlow)">SMB</text>

  <!-- Text highlight -->
  <text x="254" y="253"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="66" font-weight="900"
        text-anchor="middle" dominant-baseline="middle"
        fill="rgba(254,243,199,0.28)">SMB</text>

  <!-- ── BASKET HANDLE (drawn last — in front of coin) ── -->
  <!-- Handle glow -->
  <path d="M 164 292 Q 256 92 348 292"
        fill="none"
        stroke="rgba(251,191,36,0.25)"
        stroke-width="28"
        stroke-linecap="round"/>
  <!-- Handle main -->
  <path d="M 164 292 Q 256 92 348 292"
        fill="none"
        stroke="url(#handleGrad)"
        stroke-width="18"
        stroke-linecap="round"
        filter="url(#handleGlow)"/>
  <!-- Handle inner shine -->
  <path d="M 168 292 Q 256 100 344 292"
        fill="none"
        stroke="rgba(254,243,199,0.35)"
        stroke-width="7"
        stroke-linecap="round"/>

  <!-- ── SPARKLES ── -->
  <!-- Top-left star -->
  <g transform="translate(96,110)" filter="url(#handleGlow)">
    <path d="M0,-13 L3.5,-3.5 L13,0 L3.5,3.5 L0,13 L-3.5,3.5 L-13,0 L-3.5,-3.5 Z"
          fill="#fbbf24" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.8" fill="#fff" opacity="0.75"/>
  </g>
  <!-- Top-right star -->
  <g transform="translate(418,96)">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"
          fill="#fde68a" opacity="0.85"/>
    <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Left small -->
  <g transform="translate(70,270)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"
          fill="#4ade80" opacity="0.7"/>
  </g>
  <!-- Right small -->
  <g transform="translate(444,255)">
    <path d="M0,-9 L2.5,-2.5 L9,0 L2.5,2.5 L0,9 L-2.5,2.5 L-9,0 L-2.5,-2.5 Z"
          fill="#fbbf24" opacity="0.72"/>
  </g>
  <!-- Tiny dots -->
  <circle cx="138" cy="155" r="4"   fill="#4ade80"  opacity="0.6"/>
  <circle cx="380" cy="148" r="3.5" fill="#4ade80"  opacity="0.55"/>
  <circle cx="422" cy="185" r="3"   fill="#fbbf24"  opacity="0.5"/>
  <circle cx="92"  cy="190" r="3"   fill="#fde68a"  opacity="0.5"/>
</svg>
