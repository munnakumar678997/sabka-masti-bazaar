<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="50%" stop-color="#0f3d25"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="coinFace" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="28%"  stop-color="#fde68a"/>
      <stop offset="62%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="shine" cx="28%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glowBg" cx="50%" cy="46%" r="50%">
      <stop offset="0%"   stop-color="rgba(251,191,36,0.18)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
    <filter id="coinShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Background pattern dots -->
  <g clip-path="url(#roundRect)" opacity="0.06">
    <circle cx="80"  cy="80"  r="3" fill="#4ade80"/>
    <circle cx="160" cy="80"  r="3" fill="#4ade80"/>
    <circle cx="240" cy="80"  r="3" fill="#4ade80"/>
    <circle cx="320" cy="80"  r="3" fill="#4ade80"/>
    <circle cx="400" cy="80"  r="3" fill="#4ade80"/>
    <circle cx="80"  cy="160" r="3" fill="#4ade80"/>
    <circle cx="160" cy="160" r="3" fill="#4ade80"/>
    <circle cx="320" cy="160" r="3" fill="#4ade80"/>
    <circle cx="400" cy="160" r="3" fill="#4ade80"/>
    <circle cx="80"  cy="400" r="3" fill="#4ade80"/>
    <circle cx="160" cy="400" r="3" fill="#4ade80"/>
    <circle cx="320" cy="400" r="3" fill="#4ade80"/>
    <circle cx="400" cy="400" r="3" fill="#4ade80"/>
  </g>

  <!-- Golden ambient glow behind coin -->
  <ellipse cx="256" cy="224" rx="175" ry="168" fill="url(#glowBg)"/>

  <!-- Coin drop shadow -->
  <ellipse cx="256" cy="252" rx="118" ry="22" fill="rgba(0,0,0,0.38)"/>

  <!-- ══ MAIN COIN ══ -->
  <circle cx="256" cy="224" r="133" fill="url(#coinFace)" filter="url(#coinShadow)"/>

  <!-- Coin outer ring -->
  <circle cx="256" cy="224" r="133" fill="none" stroke="#92400e" stroke-width="3.5" opacity="0.4"/>

  <!-- Coin inner groove -->
  <circle cx="256" cy="224" r="113" fill="none" stroke="#d97706" stroke-width="2" opacity="0.5"/>

  <!-- Coin inner groove 2 -->
  <circle cx="256" cy="224" r="108" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Shine overlay -->
  <circle cx="256" cy="224" r="133" fill="url(#shine)"/>

  <!-- ₹ Rupee symbol -->
  <text
    x="256" y="272"
    font-family="'Arial Black', Arial, Helvetica, sans-serif"
    font-size="118"
    font-weight="900"
    text-anchor="middle"
    fill="#78350f"
    filter="url(#glowFilter)">₹</text>

  <!-- Inner text highlight (lighter) -->
  <text
    x="253" y="269"
    font-family="'Arial Black', Arial, Helvetica, sans-serif"
    font-size="118"
    font-weight="900"
    text-anchor="middle"
    fill="rgba(254,243,199,0.22)">₹</text>

  <!-- ══ SPARKLE STARS ══ -->
  <!-- Top-left 4-point star -->
  <g transform="translate(108,102)" filter="url(#glowFilter)">
    <path d="M0,-16 L4,-4 L16,0 L4,4 L0,16 L-4,4 L-16,0 L-4,-4 Z" fill="#fbbf24" opacity="0.95"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.8"/>
  </g>
  <!-- Top-right 4-point star -->
  <g transform="translate(400,88)" filter="url(#glowFilter)">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#fde68a" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.75"/>
  </g>
  <!-- Left 4-point star -->
  <g transform="translate(84,292)">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="#4ade80" opacity="0.8"/>
  </g>
  <!-- Right 4-point star -->
  <g transform="translate(428,275)">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#fbbf24" opacity="0.75"/>
  </g>
  <!-- Small decorative dots -->
  <circle cx="152" cy="380" r="5" fill="#fbbf24" opacity="0.55"/>
  <circle cx="368" cy="388" r="4" fill="#fbbf24" opacity="0.50"/>
  <circle cx="136" cy="155" r="4" fill="#4ade80" opacity="0.65"/>
  <circle cx="385" cy="148" r="3.5" fill="#4ade80" opacity="0.55"/>
  <circle cx="420" cy="190" r="3" fill="#fde68a" opacity="0.5"/>
  <circle cx="94"  cy="195" r="3" fill="#fde68a" opacity="0.5"/>

  <!-- ══ BOTTOM TEXT ══ -->
  <!-- Green glow bar behind text -->
  <rect x="136" y="396" width="240" height="56" rx="14" fill="rgba(34,197,94,0.10)"/>
  <rect x="136" y="396" width="240" height="56" rx="14" fill="none" stroke="rgba(74,222,128,0.18)" stroke-width="1.5"/>

  <!-- App short name -->
  <text
    x="256" y="432"
    font-family="'Arial Black', Arial, Helvetica, sans-serif"
    font-size="36"
    font-weight="900"
    text-anchor="middle"
    fill="#4ade80"
    letter-spacing="7">SMB</text>

  <!-- Tagline -->
  <text
    x="256" y="448"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    font-weight="700"
    text-anchor="middle"
    fill="rgba(74,222,128,0.55)"
    letter-spacing="3">KHELO • JEETO • KAMAO</text>
</svg>
