<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark outer background -->
    <radialGradient id="outerBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#080818"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>

    <!-- Blue circle deep navy gradient -->
    <radialGradient id="blueBg" cx="50%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#1a2e7a"/>
      <stop offset="45%"  stop-color="#0d1a5c"/>
      <stop offset="100%" stop-color="#040a2a"/>
    </radialGradient>

    <!-- Golden glow halo behind coin -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,200,30,0.55)"/>
      <stop offset="40%"  stop-color="rgba(255,165,0,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,140,0,0)"/>
    </radialGradient>

    <!-- Gold coin face — bright center, rich edges -->
    <radialGradient id="coinFace" cx="38%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#fff7c2"/>
      <stop offset="22%"  stop-color="#fde68a"/>
      <stop offset="55%"  stop-color="#f59e0b"/>
      <stop offset="85%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <!-- Coin ring gradient -->
    <linearGradient id="coinRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#b45309"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Coin shine overlay -->
    <radialGradient id="coinShine" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="70%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Blue glow ring -->
    <linearGradient id="ringGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Cart white with slight depth -->
    <linearGradient id="cartWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>

    <!-- Wheel gradient -->
    <radialGradient id="wheelGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </radialGradient>

    <!-- Drop shadow for coin -->
    <filter id="coinDrop" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <!-- Outer blue ring glow filter -->
    <filter id="ringGlowFx" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="txtGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cart glow -->
    <filter id="cartGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ OUTER DARK BACKGROUND ══ -->
  <rect width="512" height="512" rx="110" fill="url(#outerBg)"/>

  <!-- ══ DEEP BLUE CIRCLE ══ -->
  <!-- Outer glow ring (behind circle) -->
  <circle cx="256" cy="256" r="247" fill="none"
          stroke="#3b82f6" stroke-width="16" opacity="0.3"
          filter="url(#ringGlowFx)"/>

  <!-- Main blue circle fill -->
  <circle cx="256" cy="256" r="238" fill="url(#blueBg)"/>

  <!-- Bright blue border ring -->
  <circle cx="256" cy="256" r="238" fill="none"
          stroke="url(#ringGlow)" stroke-width="7"
          filter="url(#ringGlowFx)"/>

  <!-- Inner edge highlight -->
  <circle cx="256" cy="256" r="234" fill="none"
          stroke="rgba(147,197,253,0.35)" stroke-width="2"/>

  <!-- ══ GOLDEN HALO (behind coin) ══ -->
  <ellipse cx="256" cy="196" rx="190" ry="175" fill="url(#halo)"/>

  <!-- ══ GOLD COIN (drawn before cart so cart overlaps) ══ -->
  <!-- Coin outer shadow -->
  <circle cx="256" cy="196" r="141" fill="rgba(0,0,0,0.4)"
          transform="translate(0,16)"/>

  <!-- Coin body -->
  <circle cx="256" cy="196" r="141" fill="url(#coinFace)" filter="url(#coinDrop)"/>

  <!-- Coin outer groove ring -->
  <circle cx="256" cy="196" r="141" fill="none"
          stroke="url(#coinRing)" stroke-width="5" opacity="0.55"/>

  <!-- Coin inner groove ring -->
  <circle cx="256" cy="196" r="122" fill="none"
          stroke="#d97706" stroke-width="2.5" opacity="0.45"/>
  <circle cx="256" cy="196" r="116" fill="none"
          stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Coin shine highlight -->
  <circle cx="256" cy="196" r="141" fill="url(#coinShine)"/>

  <!-- ══ "SMB" TEXT ON COIN ══ -->
  <!-- Depth shadow -->
  <text x="258" y="214"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="88" font-weight="900" font-style="italic"
        text-anchor="middle" dominant-baseline="middle"
        fill="rgba(10,30,120,0.35)">SMB</text>

  <!-- Main text -->
  <text x="256" y="210"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="88" font-weight="900" font-style="italic"
        text-anchor="middle" dominant-baseline="middle"
        fill="#0f2070"
        filter="url(#txtGlow)">SMB</text>

  <!-- Text inner highlight -->
  <text x="254" y="206"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="88" font-weight="900" font-style="italic"
        text-anchor="middle" dominant-baseline="middle"
        fill="rgba(100,130,255,0.2)">SMB</text>

  <!-- ══ SHOPPING CART (drawn OVER coin bottom) ══ -->

  <!-- Cart handle bar (horizontal top) -->
  <rect x="148" y="303" width="236" height="18" rx="9" fill="url(#cartWhite)"
        filter="url(#cartGlow)"/>

  <!-- Handle hook (vertical) -->
  <rect x="148" y="303" width="18" height="44" rx="9" fill="url(#cartWhite)"/>

  <!-- Hook to basket connector -->
  <rect x="152" y="339" width="32" height="14" rx="7" fill="url(#cartWhite)"/>

  <!-- ══ BASKET BODY ══ -->
  <!-- Basket outline (trapezoid) -->
  <path d="M 186 320 L 171 413 Q 169 423 180 423 L 355 423 Q 366 423 364 413 L 349 320 Z"
        fill="rgba(255,255,255,0.08)"
        stroke="url(#cartWhite)"
        stroke-width="4.5"
        stroke-linejoin="round"/>

  <!-- Basket slot row 1 -->
  <rect x="182" y="333" width="72" height="14" rx="5.5" fill="white" opacity="0.92"/>
  <rect x="263" y="333" width="72" height="14" rx="5.5" fill="white" opacity="0.92"/>

  <!-- Basket slot row 2 -->
  <rect x="179" y="357" width="74" height="14" rx="5.5" fill="white" opacity="0.92"/>
  <rect x="262" y="357" width="74" height="14" rx="5.5" fill="white" opacity="0.92"/>

  <!-- Basket slot row 3 -->
  <rect x="176" y="381" width="76" height="14" rx="5.5" fill="white" opacity="0.92"/>
  <rect x="261" y="381" width="76" height="14" rx="5.5" fill="white" opacity="0.92"/>

  <!-- Basket bottom bar -->
  <rect x="171" y="405" width="196" height="14" rx="6" fill="url(#cartWhite)" opacity="0.9"/>

  <!-- Cart axle bar -->
  <rect x="184" y="424" width="174" height="9" rx="4" fill="white" opacity="0.55"/>

  <!-- ══ CART WHEELS ══ -->
  <!-- Left wheel -->
  <circle cx="207" cy="451" r="24" fill="url(#wheelGrad)"
          filter="url(#cartGlow)"/>
  <circle cx="207" cy="451" r="13" fill="#0d1a5c" opacity="0.75"/>
  <circle cx="207" cy="451" r="6"  fill="#1d3a8a" opacity="0.6"/>
  <circle cx="203" cy="447" r="3"  fill="rgba(255,255,255,0.25)"/>

  <!-- Right wheel -->
  <circle cx="336" cy="451" r="24" fill="url(#wheelGrad)"
          filter="url(#cartGlow)"/>
  <circle cx="336" cy="451" r="13" fill="#0d1a5c" opacity="0.75"/>
  <circle cx="336" cy="451" r="6"  fill="#1d3a8a" opacity="0.6"/>
  <circle cx="332" cy="447" r="3"  fill="rgba(255,255,255,0.25)"/>

  <!-- ══ FINAL BLUE RING (on top for clean edge) ══ -->
  <circle cx="256" cy="256" r="238" fill="none"
          stroke="#2563eb" stroke-width="4.5" opacity="0.8"/>
</svg>
